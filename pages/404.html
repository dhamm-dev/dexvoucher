<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan</title>
  <meta name="description" content="Halaman yang Anda cari tidak ditemukan.">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; background: var(--bg-primary); }
    .error-card { text-align: center; max-width: 480px; }
    .error-code { font-size: 8rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 8px; }
    .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    .error-desc { color: var(--text-secondary); margin-bottom: 32px; font-size: 1rem; line-height: 1.6; }
    .error-emoji { font-size: 4rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-card">
      <div class="error-emoji"><img class="icon-img" src="../../assets/images/icons/search.png" alt="" style="width:64px;height:64px"></div>
      <div class="error-code">404</div>
      <h1 class="error-title">Waduh, Nyasar!</h1>
      <p class="error-desc">Kayaknya halaman yang kamu cari lagi main petak umpet dan nggak ketemu. Mungkin salah alamat atau halaman ini sudah dihapus.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="../../index.html" class="btn btn-primary btn-lg">🏠 Kembali ke Home</a>
        <a href="javascript:history.back()" class="btn btn-secondary btn-lg">🔙 Kembali</a>
      </div>
      <p style="margin-top:32px;color:var(--text-muted);font-size:0.85rem">Tenang, ini hanya error. Bukan request dicekokin duit.</p>
    </div>
  </div>
  <script src="../../assets/js/theme.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function () { ThemeManager.init(); });</script>
</body>
</html>
