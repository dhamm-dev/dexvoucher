<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengaturan Admin — DexVoucher</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .settings-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border); gap: 16px;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item-info h3 { font-size: 0.95rem; margin-bottom: 2px; }
    .settings-item-info p { font-size: 0.82rem; color: var(--text-secondary); }
    .toggle-switch {
      position: relative; width: 48px; height: 26px; background: var(--border);
      border-radius: 13px; cursor: pointer; transition: var(--transition); flex-shrink: 0;
    }
    .toggle-switch.active { background: var(--accent); }
    .toggle-switch::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: var(--transition);
    }
    .toggle-switch.active::after { left: 25px; }
  </style>
</head>
<body>
  <div id="admin-layout"></div>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/admin-sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init(); Auth.requireAdmin(); AdminSidebar.render();
      document.getElementById('breadcrumb').textContent = 'Pengaturan';
      const content = document.getElementById('admin-content');

      function loadSettings() {
        const settings = Storage.get(Storage.KEYS.SETTINGS) || { siteName: 'DexVoucher', siteEmail: 'support@dexvoucher.com', siteWhatsApp: '6281234567890', maintenanceMode: false };
        return settings;
      }

      function render() {
        const s = loadSettings();
        content.innerHTML = `
          <div class="page-header"><h1>Pengaturan Situs</h1></div>
          <div id="alert-container"></div>

          <div class="card" style="margin-bottom:20px">
            <h3 style="margin-bottom:16px">Informasi Situs</h3>
            <form id="settings-form">
              <div class="form-group input-group">
                <label>Nama Website</label>
                <input type="text" id="s-name" class="input-field" value="${s.siteName}" required>
              </div>
              <div class="form-group input-group">
                <label>Email Support</label>
                <input type="email" id="s-email" class="input-field" value="${s.siteEmail}" required>
              </div>
              <div class="form-group input-group">
                <label>Nomor WhatsApp</label>
                <input type="text" id="s-wa" class="input-field" value="${s.siteWhatsApp}" placeholder="62812xxxxxx" required>
              </div>
              <button type="submit" class="btn btn-primary">Simpan Pengaturan</button>
              <span id="settings-status" style="margin-left:12px;font-size:0.85rem"></span>
            </form>
          </div>

          <div class="card" style="margin-bottom:20px">
            <h3 style="margin-bottom:4px">Mode Pemeliharaan</h3>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">Aktifkan banner maintenance di sisi user</p>
            <div class="settings-item" style="border:none;padding-top:0">
              <div class="settings-item-info">
                <h3>Maintenance Mode</h3>
                <p>${s.maintenanceMode ? 'Situs sedang dalam mode pemeliharaan' : 'Situs berjalan normal'}</p>
              </div>
              <div class="toggle-switch ${s.maintenanceMode ? 'active' : ''}" id="maintenance-toggle"></div>
            </div>
          </div>

          <div class="card" style="margin-bottom:20px">
            <h3 style="margin-bottom:4px;color:var(--danger)">⚠️ Zona Berbahaya</h3>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:8px">Tindakan ini akan menghapus semua data aplikasi</p>
            <button class="btn btn-danger" id="admin-reset-btn">Reset Semua Data</button>
          </div>
        `;

        // Save settings
        document.getElementById('settings-form').addEventListener('submit', function (e) {
          e.preventDefault();
          const name = document.getElementById('s-name').value.trim();
          const email = document.getElementById('s-email').value.trim();
          const wa = document.getElementById('s-wa').value.trim();
          if (!name || !email || !wa) { document.getElementById('settings-status').textContent = 'Semua field harus diisi'; document.getElementById('settings-status').style.color = 'var(--danger)'; return; }
          const s = loadSettings();
          s.siteName = name; s.siteEmail = email; s.siteWhatsApp = wa; s.updatedAt = new Date().toISOString();
          Storage.set(Storage.KEYS.SETTINGS, s);
          document.getElementById('settings-status').textContent = '✅ Pengaturan disimpan';
          document.getElementById('settings-status').style.color = 'var(--success)';
        });

        // Maintenance toggle
        const maintToggle = document.getElementById('maintenance-toggle');
        maintToggle.addEventListener('click', function () {
          const s = loadSettings();
          s.maintenanceMode = !s.maintenanceMode;
          s.updatedAt = new Date().toISOString();
          Storage.set(Storage.KEYS.SETTINGS, s);
          this.classList.toggle('active');
          render();
        });

        // Reset all data
        document.getElementById('admin-reset-btn').addEventListener('click', function () {
          const ov = document.querySelector('.modal-overlay'); if (ov) ov.remove();
          const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
          overlay.innerHTML = `
            <div class="modal" style="max-width:420px">
              <div class="modal-header"><h3 style="color:var(--danger)">⚠️ Reset Semua Data</h3><button class="modal-close" id="modal-close">&times;</button></div>
              <div class="modal-body">
                <p style="margin-bottom:12px">SEMUA data akan dihapus: user, produk, transaksi, promo, pengaturan. Tindakan ini TIDAK dapat dibatalkan.</p>
                <div class="input-group"><label>Ketik <strong>RESET SEMUA</strong> untuk konfirmasi</label><input type="text" id="confirm-reset-input" class="input-field" placeholder="Ketik RESET SEMUA"><span class="input-error" id="confirm-error"></span></div>
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" id="cancel-btn">Batal</button>
                <button class="btn btn-danger" id="confirm-reset-btn" disabled>Reset Semua</button>
              </div>
            </div>`;
          document.body.appendChild(overlay);
          const input = overlay.querySelector('#confirm-reset-input');
          const confirmBtn = overlay.querySelector('#confirm-reset-btn');
          input.addEventListener('input', function () { confirmBtn.disabled = this.value !== 'RESET SEMUA'; });
          overlay.querySelectorAll('#modal-close, #cancel-btn').forEach(el => el.addEventListener('click', () => overlay.remove()));
          overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
          confirmBtn.addEventListener('click', function () {
            Storage.clear();
            overlay.remove();
            window.location.href = 'login-admin.html';
          });
        });
      }
      render();
    });
  </script>
</body>
</html>
