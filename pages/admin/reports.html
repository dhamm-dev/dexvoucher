<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan — DexVoucher</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="admin-layout"></div>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/transaction.js"></script>
  <script src="../../assets/js/products.js"></script>
  <script src="../../assets/js/admin-sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init(); Auth.requireAdmin(); AdminSidebar.render();
      document.getElementById('breadcrumb').textContent = 'Laporan';
      const content = document.getElementById('admin-content');

      function render(period) {
        const allTrxs = Transaction.getAll();
        const successTrx = allTrxs.filter(t => t.status === 'success');
        const now = new Date();

        let filtered = successTrx;
        if (period === 'today') filtered = successTrx.filter(t => { const d = new Date(t.createdAt); return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
        else if (period === 'week') { const w = new Date(now); w.setDate(w.getDate() - 7); filtered = successTrx.filter(t => new Date(t.createdAt) >= w); }
        else if (period === 'month') { const m = new Date(now); m.setMonth(m.getMonth() - 1); filtered = successTrx.filter(t => new Date(t.createdAt) >= m); }

        const totalRevenue = filtered.reduce((s, t) => s + (t.total || 0), 0);
        const totalCount = filtered.length;
        const avgTrx = totalCount > 0 ? Math.round(totalRevenue / totalCount) : 0;

        // Hitung pendapatan per game
        const gameRevenue = {};
        filtered.forEach(t => {
          const g = t.gameId || 'unknown';
          gameRevenue[g] = (gameRevenue[g] || 0) + (t.total || 0);
        });
        const sortedGameRev = Object.entries(gameRevenue).sort((a, b) => b[1] - a[1]);

        // Hitung top produk
        const productSales = {};
        filtered.forEach(t => t.items.forEach(item => {
          const key = item.name;
          productSales[key] = (productSales[key] || 0) + (item.qty || 1);
        }));
        const topProducts = Object.entries(productSales).sort((a, b) => b[1] - a[1]).slice(0, 10);

        content.innerHTML = `
          <div class="page-header">
            <h1>Laporan</h1>
            <div class="flex gap-sm" id="period-btns">
              <button class="btn ${period === 'today' ? 'btn-primary' : 'btn-secondary'} btn-sm period-btn" data-period="today">Hari Ini</button>
              <button class="btn ${period === 'week' ? 'btn-primary' : 'btn-secondary'} btn-sm period-btn" data-period="week">7 Hari</button>
              <button class="btn ${period === 'month' ? 'btn-primary' : 'btn-secondary'} btn-sm period-btn" data-period="month">30 Hari</button>
              <button class="btn ${period === 'all' ? 'btn-primary' : 'btn-secondary'} btn-sm period-btn" data-period="all">Semua</button>
            </div>
          </div>

          <div class="grid grid-3 gap-md" style="margin-bottom:24px">
            <div class="stat-card"><div class="stat-label">Total Pendapatan</div><div class="stat-value" style="color:var(--success)">${formatRupiah(totalRevenue)}</div></div>
            <div class="stat-card"><div class="stat-label">Total Transaksi</div><div class="stat-value">${totalCount}</div></div>
            <div class="stat-card"><div class="stat-label">Rata-rata Transaksi</div><div class="stat-value">${formatRupiah(avgTrx)}</div></div>
          </div>

          <div class="grid grid-2 gap-md" style="margin-bottom:24px">
            <div class="chart-wrapper"><h3>📊 Pendapatan per Game</h3><canvas id="gameRevenueChart" height="200"></canvas></div>
            <div class="card"><h3 style="margin-bottom:12px">🏆 Top Produk Terlaris</h3>
              ${topProducts.length ? `
              <div class="table-wrapper">
                <table><thead><tr><th>Produk</th><th style="text-align:right">Terjual</th></tr></thead>
                <tbody>${topProducts.map(([name, qty]) => `<tr><td>${name}</td><td style="text-align:right;font-weight:600">${qty}</td></tr>`).join('')}</tbody>
              </table></div>` : '<p style="color:var(--text-muted)">Belum ada data</p>'}
            </div>
          </div>

          <div style="text-align:right">
            <button class="btn btn-outline" id="export-report-csv">📥 Export Laporan CSV</button>
          </div>
        `;

        // Period buttons
        document.querySelectorAll('.period-btn').forEach(b => b.addEventListener('click', function () {
          render(this.dataset.period);
        }));

        // Charts
        const labels = sortedGameRev.map(([k]) => { const g = Products.GAMES[k]; return g ? g.name : k; });
        const data = sortedGameRev.map(([, v]) => v);
        const colors = ['#6c63ff', '#FF6B35', '#1E90FF', '#F5A623', '#27AE60', '#FF4655', '#9B59B6', '#4A9EFF', '#C0A0FF'];
        new Chart(document.getElementById('gameRevenueChart'), {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Pendapatan', data, backgroundColor: colors.slice(0, labels.length) }] },
          options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => formatRupiah(v) } } } }
        });

        // Export
        document.getElementById('export-report-csv').addEventListener('click', function () {
          const rows = [['Periode', 'Total Pendapatan', 'Total Transaksi', 'Rata-rata']];
          rows.push([period, totalRevenue, totalCount, avgTrx]);
          rows.push([]);
          rows.push(['Game', 'Pendapatan']);
          sortedGameRev.forEach(([k, v]) => { const g = Products.GAMES[k]; rows.push([g ? g.name : k, v]); });
          const csv = rows.map(r => r.join(',')).join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'laporan_dexvoucher_' + period + '_' + Date.now() + '.csv';
          link.click();
        });
      }
      render('all');
    });
  </script>
</body>
</html>
