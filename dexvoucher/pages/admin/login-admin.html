<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — DexVoucher</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; background: var(--bg-primary); }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px 32px; width: 100%; max-width: 420px; animation: slideUp 0.4s ease; }
    .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 32px; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .auth-title { text-align: center; font-size: 1.25rem; font-weight: 700; margin-bottom: 4px; }
    .auth-subtitle { text-align: center; color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 24px; }
    .auth-link { text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 16px; }
    .auth-link a { color: var(--accent); font-weight: 600; }
    .loading-spinner { display: inline-flex; align-items: center; gap: 8px; }
    .loading-spinner .spinner { width: 18px; height: 18px; border-width: 2px; }
    .admin-badge { display: inline-block; background: var(--warning); color: #000; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">🔐 DexVoucher</div>
      <h1 class="auth-title">Login Admin</h1>
      <p class="auth-subtitle">Hanya untuk administrator</p>
      <div class="admin-badge" style="display:block;text-align:center;width:fit-content;margin:0 auto 20px">Admin Area</div>
      <div id="alert-container"></div>
      <form id="login-admin-form" novalidate>
        <div class="form-group input-group">
          <label for="email">Email Admin</label>
          <input type="email" id="email" class="input-field" placeholder="admin@dexvoucher.com" autocomplete="email" required>
          <span class="input-error" id="email-error"></span>
        </div>
        <div class="form-group input-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="input-field" placeholder="Masukkan password" autocomplete="current-password" required>
          <span class="input-error" id="password-error"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn">Masuk sebagai Admin</button>
      </form>
      <p class="auth-link"><a href="../user/login.html">Kembali ke Login User</a></p>
    </div>
  </div>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init();
      if (Auth.isLoggedIn() && Auth.isAdmin()) { window.location.href = 'dashboard-admin.html'; return; }
      const form = document.getElementById('login-admin-form');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        document.getElementById('alert-container').innerHTML = '';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) { showAlert('error', 'Email dan password harus diisi'); return; }
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"><span class="spinner"></span> Memproses...</span>';
        const result = Auth.loginAdmin({ email, password });
        setTimeout(function () {
          if (result.success) {
            showAlert('success', 'Login berhasil!');
            setTimeout(() => window.location.href = 'dashboard-admin.html', 600);
          } else {
            btn.disabled = false; btn.innerHTML = 'Masuk sebagai Admin';
            showAlert('error', result.message);
          }
        }, 600);
      });
      function showAlert(type, message) {
        document.getElementById('alert-container').innerHTML = '<div class="alert alert-' + type + '"><span class="alert-icon">' + (type === 'success' ? '✅' : '❌') + '</span><span class="alert-body">' + message + '</span></div>';
      }
    });
  </script>
</body>
</html>
