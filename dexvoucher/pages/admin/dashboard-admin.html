<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — DexVoucher</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="admin-layout"></div>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/cart.js"></script>
  <script src="../../assets/js/promo.js"></script>
  <script src="../../assets/js/transaction.js"></script>
  <script src="../../assets/js/products.js"></script>
  <script src="../../assets/js/admin-sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init();
      if (typeof Seed !== 'undefined') Seed.init();
      Auth.requireAdmin();
      AdminSidebar.render();
      document.getElementById('breadcrumb').textContent = 'Dashboard';

      const content = document.getElementById('admin-content');
      const users = Storage.getUsers();
      const transactions = Transaction.getAll();
      const products = Storage.getProducts();
      const successTrx = transactions.filter(t => t.status === 'success');

      const todayRevenue = successTrx.filter(t => {
        const d = new Date(t.createdAt);
        const now = new Date();
        return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      }).reduce((s, t) => s + (t.total || 0), 0);

      // Stat cards
      content.innerHTML = `
        <div class="grid grid-4 gap-md" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-label">Total User</div><div class="stat-value">${users.length}</div></div>
          <div class="stat-card"><div class="stat-label">Total Transaksi</div><div class="stat-value">${transactions.length}</div></div>
          <div class="stat-card"><div class="stat-label">Pendapatan Hari Ini</div><div class="stat-value">${formatRupiah(todayRevenue)}</div></div>
          <div class="stat-card"><div class="stat-label">Produk Aktif</div><div class="stat-value">${products.filter(p => p.isActive).length}</div></div>
        </div>
        <div class="grid grid-2 gap-md" style="margin-bottom:24px">
          <div class="chart-wrapper"><h3>📈 Pendapatan 7 Hari</h3><canvas id="lineChart" height="200"></canvas></div>
          <div class="chart-wrapper"><h3><img class="icon-img" src="../../assets/images/icons/video-game.png" alt="" style="width:20px;height:20px"> Top 5 Game Terlaris</h3><canvas id="pieChart" height="200"></canvas></div>
        </div>
        <div class="grid grid-2 gap-md">
          <div class="card"><h3 style="margin-bottom:12px">Transaksi Terbaru</h3><div id="recent-trx-table"></div></div>
          <div class="card"><h3 style="margin-bottom:12px">User Terbaru</h3><div id="recent-user-table"></div></div>
        </div>
      `;

      // Recent transactions
      const recentTrx = transactions.slice(0, 5);
      document.getElementById('recent-trx-table').innerHTML = recentTrx.length ? `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>ID</th><th>Total</th><th>Status</th></tr></thead>
            <tbody>${recentTrx.map(t => `<tr><td style="font-family:var(--font-mono);font-size:0.8rem">${t.id}</td><td>${formatRupiah(t.total)}</td><td><span class="badge ${t.status === 'success' ? 'badge-success' : t.status === 'failed' ? 'badge-failed' : 'badge-pending'}">${t.status}</span></td></tr>`).join('')}</tbody>
          </table>
        </div>` : '<p style="color:var(--text-muted)">Belum ada transaksi</p>';

      // Recent users
      const recentUsers = users.slice(-5).reverse();
      document.getElementById('recent-user-table').innerHTML = recentUsers.length ? `
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Nama</th><th>Email</th><th>Role</th></tr></thead>
            <tbody>${recentUsers.map(u => `<tr><td>${u.name}</td><td style="font-size:0.82rem">${u.email}</td><td><span class="badge ${u.role === 'admin' ? 'badge-hot' : 'badge-new'}">${u.role}</span></td></tr>`).join('')}</tbody>
          </table>
        </div>` : '<p style="color:var(--text-muted)">Belum ada user</p>';

      // Charts
      const days = ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];
      const revenue7 = days.map((_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - i));
        const dayTrx = successTrx.filter(t => { const td = new Date(t.createdAt); return td.getDate() === d.getDate() && td.getMonth() === d.getMonth() && td.getFullYear() === d.getFullYear(); });
        return dayTrx.reduce((s, t) => s + (t.total || 0), 0);
      });
      new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: days, datasets: [{ label: 'Pendapatan', data: revenue7, borderColor: '#6c63ff', backgroundColor: 'rgba(108,99,255,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => formatRupiah(v) } } } } });

      const gameSales = {};
      successTrx.forEach(t => t.items.forEach(item => { const g = t.gameId || 'unknown'; gameSales[g] = (gameSales[g] || 0) + (item.qty || 1); }));
      const sortedGames = Object.entries(gameSales).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const pieLabels = sortedGames.map(([k]) => { const game = Products.GAMES[k]; return game ? game.name : k; });
      const pieData = sortedGames.map(([, v]) => v);
      const pieColors = ['#6c63ff', '#FF6B35', '#1E90FF', '#F5A623', '#27AE60'];
      new Chart(document.getElementById('pieChart'), { type: 'pie', data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
    });
  </script>
</body>
</html>
