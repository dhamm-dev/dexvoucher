<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — DexVoucher</title>
  <meta name="description" content="Reset password akun DexVoucher.">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--bg-primary);
    }
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.4s ease;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .auth-logo img { height: 40px; }
    .auth-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 24px;
    }
    .auth-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 16px;
    }
    .auth-link a {
      color: var(--accent);
      font-weight: 600;
    }
    .auth-link a:hover { text-decoration: underline; }
    .loading-spinner {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .loading-spinner .spinner {
      width: 18px;
      height: 18px;
      border-width: 2px;
    }
    .token-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-top: 16px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      word-break: break-all;
      display: none;
    }
    .token-box.show { display: block; }
    .token-box .token-label {
      font-family: var(--font-main);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .token-box .token-value {
      color: var(--accent);
    }
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: var(--transition);
    }
    .step-dot.active { background: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="../../assets/images/logo/logo.svg" alt="DexVoucher" onerror="this.style.display='none'">
        DexVoucher
      </div>
      <h1 class="auth-title">Lupa Password</h1>
      <p class="auth-subtitle" id="step-description">Masukkan email untuk mendapatkan token reset</p>

      <div id="alert-container"></div>

      <!-- Step 1: Input Email -->
      <form id="forgot-form" novalidate>
        <div class="step-indicator">
          <span class="step-dot active" id="dot-1"></span>
          <span class="step-dot" id="dot-2"></span>
        </div>

        <div class="form-group input-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input-field" placeholder="Masukkan email terdaftar" autocomplete="email" required>
          <span class="input-error" id="email-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn">
          Kirim Token Reset
        </button>
      </form>

      <!-- Token display -->
      <div class="token-box" id="token-box">
        <div class="token-label">Token Reset Anda:</div>
        <div class="token-value" id="token-value"></div>
        <p style="margin-top:12px;font-size:0.8rem;color:var(--text-muted)">
          Salin token di atas, lalu gunakan untuk mereset password. Token berlaku selama 1 jam.
        </p>
      </div>

      <!-- Step 2: Reset Password -->
      <form id="reset-form" novalidate style="display:none">
        <div class="form-group input-group">
          <label for="reset-token">Token Reset</label>
          <input type="text" id="reset-token" class="input-field" placeholder="Masukkan token" required>
          <span class="input-error" id="token-error"></span>
        </div>

        <div class="form-group input-group">
          <label for="new-password">Password Baru</label>
          <input type="password" id="new-password" class="input-field" placeholder="Minimal 6 karakter" autocomplete="new-password" required>
          <span class="input-error" id="new-password-error"></span>
        </div>

        <div class="form-group input-group">
          <label for="confirm-new-password">Konfirmasi Password Baru</label>
          <input type="password" id="confirm-new-password" class="input-field" placeholder="Ulangi password baru" autocomplete="new-password" required>
          <span class="input-error" id="confirm-new-error"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="reset-btn">
          Reset Password
        </button>
      </form>

      <p class="auth-link" id="back-link">
        <a href="login.html">Kembali ke Login</a>
      </p>
    </div>
  </div>

  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init();

      const forgotForm = document.getElementById('forgot-form');
      const resetForm = document.getElementById('reset-form');
      const emailInput = document.getElementById('email');
      const emailError = document.getElementById('email-error');
      const submitBtn = document.getElementById('submit-btn');
      const resetBtn = document.getElementById('reset-btn');
      const alertContainer = document.getElementById('alert-container');
      const tokenBox = document.getElementById('token-box');
      const tokenValue = document.getElementById('token-value');
      const resetTokenInput = document.getElementById('reset-token');
      const newPasswordInput = document.getElementById('new-password');
      const confirmNewInput = document.getElementById('confirm-new-password');
      const tokenError = document.getElementById('token-error');
      const newPasswordError = document.getElementById('new-password-error');
      const confirmNewError = document.getElementById('confirm-new-error');
      const stepDesc = document.getElementById('step-description');
      const dot1 = document.getElementById('dot-1');
      const dot2 = document.getElementById('dot-2');
      const backLink = document.getElementById('back-link');

      // Validasi real-time email
      emailInput.addEventListener('input', function () {
        const val = this.value.trim();
        if (val && !validateEmail(val)) {
          this.classList.add('error'); this.classList.remove('success');
          emailError.textContent = 'Format email tidak valid';
        } else if (val) {
          this.classList.remove('error'); this.classList.add('success');
          emailError.textContent = '';
        } else {
          this.classList.remove('error', 'success');
          emailError.textContent = '';
        }
      });

      // Step 1: Kirim token
      forgotForm.addEventListener('submit', function (e) {
        e.preventDefault();
        alertContainer.innerHTML = '';
        let valid = true;

        if (!emailInput.value.trim()) {
          emailInput.classList.add('error');
          emailError.textContent = 'Email harus diisi';
          valid = false;
        } else if (!validateEmail(emailInput.value.trim())) {
          emailInput.classList.add('error');
          emailError.textContent = 'Format email tidak valid';
          valid = false;
        }
        if (!valid) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading-spinner"><span class="spinner"></span> Mengirim...</span>';

        const result = Auth.forgotPassword(emailInput.value.trim());

        setTimeout(function () {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Kirim Token Reset';

          if (result.success) {
            // Tampilkan token
            tokenValue.textContent = result.token;
            tokenBox.classList.add('show');
            showAlert('success', 'Token reset berhasil dibuat!');

            // Sembunyikan form forgot, tampilkan form reset
            forgotForm.style.display = 'none';
            resetForm.style.display = 'block';
            stepDesc.textContent = 'Masukkan token dan password baru';
            dot1.classList.remove('active');
            dot2.classList.add('active');
            backLink.innerHTML = '<a href="login.html">Kembali ke Login</a>';
          } else {
            showAlert('error', result.message);
            if (result.message.includes('terdaftar')) {
              emailInput.classList.add('error');
              emailError.textContent = 'Email tidak terdaftar';
            }
          }
        }, 600);
      });

      // Validasi real-time password baru
      newPasswordInput.addEventListener('input', function () {
        const val = this.value;
        if (val && val.length < 6) {
          this.classList.add('error'); this.classList.remove('success');
          newPasswordError.textContent = 'Password minimal 6 karakter';
        } else if (val) {
          this.classList.remove('error'); this.classList.add('success');
          newPasswordError.textContent = '';
        } else {
          this.classList.remove('error', 'success');
          newPasswordError.textContent = '';
        }
        if (confirmNewInput.value) validateConfirmNew();
      });

      confirmNewInput.addEventListener('input', validateConfirmNew);
      function validateConfirmNew() {
        const val = confirmNewInput.value;
        if (!val) {
          confirmNewInput.classList.remove('error', 'success');
          confirmNewError.textContent = '';
        } else if (val !== newPasswordInput.value) {
          confirmNewInput.classList.add('error'); confirmNewInput.classList.remove('success');
          confirmNewError.textContent = 'Password tidak cocok';
        } else {
          confirmNewInput.classList.remove('error'); confirmNewInput.classList.add('success');
          confirmNewError.textContent = '';
        }
      }

      // Step 2: Reset password
      resetForm.addEventListener('submit', function (e) {
        e.preventDefault();
        alertContainer.innerHTML = '';
        let valid = true;

        if (!resetTokenInput.value.trim()) {
          resetTokenInput.classList.add('error');
          tokenError.textContent = 'Token harus diisi';
          valid = false;
        }
        if (!newPasswordInput.value) {
          newPasswordInput.classList.add('error');
          newPasswordError.textContent = 'Password baru harus diisi';
          valid = false;
        } else if (newPasswordInput.value.length < 6) {
          newPasswordInput.classList.add('error');
          newPasswordError.textContent = 'Password minimal 6 karakter';
          valid = false;
        }
        if (!confirmNewInput.value) {
          confirmNewInput.classList.add('error');
          confirmNewError.textContent = 'Konfirmasi password harus diisi';
          valid = false;
        } else if (confirmNewInput.value !== newPasswordInput.value) {
          confirmNewInput.classList.add('error');
          confirmNewError.textContent = 'Password tidak cocok';
          valid = false;
        }
        if (!valid) return;

        resetBtn.disabled = true;
        resetBtn.innerHTML = '<span class="loading-spinner"><span class="spinner"></span> Memproses...</span>';

        const result = Auth.resetPassword(resetTokenInput.value.trim(), newPasswordInput.value);

        setTimeout(function () {
          resetBtn.disabled = false;
          resetBtn.innerHTML = 'Reset Password';

          if (result.success) {
            showAlert('success', 'Password berhasil direset! Mengalihkan...');
            setTimeout(function () {
              window.location.href = 'login.html';
            }, 1500);
          } else {
            showAlert('error', result.message);
          }
        }, 600);
      });
    });
  </script>
</body>
</html>
