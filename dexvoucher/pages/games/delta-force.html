<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Delta Force — DexVoucher</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .game-banner { padding: 100px 0 60px; position: relative; }
    .game-header-content { display: flex; align-items: center; gap: 24px; }
    .game-header-logo { width: 80px; height: 80px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .game-header-logo img { display: block; }
    .banner-overlay { position: absolute; inset: 0; z-index: 1; }
    .glass-header { background: rgba(0, 0, 0, 0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 16px; padding: 20px 24px; }
    .game-header-title { font-size: 1.75rem; color: #fff; margin-bottom: 4px; }
    .game-header-desc { color: rgba(255,255,255,0.8); font-size: 0.9rem; max-width: 500px; }
    .game-content { padding: 32px 0 60px; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <div id="game-header"></div>
  <div class="game-content">
    <div class="container">
      <div id="game-id-form" style="margin-bottom:24px;max-width:600px"></div>
      <div id="category-tabs" class="tabs"></div>
      <div id="product-grid" class="grid grid-4 gap-lg"></div>
    </div>
  </div>
  <script src="../../assets/js/utils.js"></script>
  <script src="../../assets/js/storage.js"></script>
  <script src="../../assets/js/theme.js"></script>
  <script src="../../data/seed.js"></script>
  <script src="../../assets/js/auth.js"></script>
  <script src="../../assets/js/navbar.js"></script>
  <script src="../../assets/js/cart.js"></script>
  <script src="../../assets/js/products.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      ThemeManager.init();
      if (typeof Seed !== 'undefined') Seed.init();
      Navbar.render();
      Products.renderGamePage('delta-force');
    });
  </script>
</body>
</html>
